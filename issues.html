<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issue Tracker</title>
    <link rel="stylesheet" href="css/style.css" />
    <link href="https://googleapis.com" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <header>
      <div class="container">
        <nav class="top-navbar">
          <div class="brand"><h1>Github Issue Tracker</h1></div>
          <div class="search-box">
            <input
              type="text"
              id="search-input"
              placeholder="Start typing for search anything..."
              onkeyup="search()"
            />
          </div>
        </nav>
      </div>
    </header>
    <section class="">
      <div class="container">
        <div class="tabs">
          <ul>
            <li onclick="filterByStatus(this)"  class="active" data-status="all">All</li>
            <li onclick="filterByStatus(this)"  class="" data-status="open" >Open</li>
            <li onclick="filterByStatus(this)"  class="" data-status="closed">Closed</li>
          </ul>
        </div>
        <div class="issue-counter-label">
          <div class="issue-counter">
            <div class="issue-counter-icon">
              <img src="assets/Aperture.png" alt="" />
            </div>
            <div class="issue-counter-text">
              <h1 id="issue-counter">0 Issues</h1>
              <p class="text-gray">Track and manage your project issues</p>
            </div>
          </div>
          <div class="issue-label">
            <ul>
              <li>Open</li>
              <li>Closed</li>
            </ul>
          </div>
        </div>
        <div id="spinner" class="text-center spinner hidden">
          <i class="fa-solid fa-spinner"></i>
          <p class="text-gray">Issues Loading</p>
        </div>
        <div class="issue-cards" id="issue-list">
          <div class="issue-card">
             
        </div>
      </div>
    </section>
    <div class="issue_modal" id="issue_modal">
      <div class="modal-box">
        <div class="modal-content" id="modal-content">
          
        </div>
        <form method="dialog">
          <button class="button solid-red">
            <i class="fa-regular fa-circle-xmark"></i> Close
          </button>
        </form>
      </div>
    </div>
    <script src="js/issues.js"></script>
  </body>
</html>
