<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issue Tracker Login</title>
    <link rel="stylesheet" href="css/style.css" />
    <link href="https://googleapis.com" rel="stylesheet" />
  </head>
  <body>
    <section class="section">
      <div class="container">
        <div class="login-card">
          <div class="login-header">
            <div class="logo">
              <img src="assets/github-logo.png" alt="" />
            </div>
            <div class="heading-text">
              <h1>GitHub Issues Tracker</h1>
              <p class="text-gray">Sign in to manage your issues</p>
            </div>
          </div>
          <div class="login-form">
            <label for="">Username</label>
            <input id="username" type="text" placeholder="Enter Username" />
            <span class="text-blue text-sm">Default: admin</span>
            <label for="">Password</label>
            <input id="password" type="password" placeholder="Enter Password" />
            <span class="text-blue text-sm">Default: admin123</span>
            <input onclick="login()" type="button" value="Sign In" />
          </div>
          <div class="divider"><span>OR</span></div>
          <div class="demo-credentials">
            <span>Demo Credentials:</span>
            <div class="userpass-card">
              <p><strong>Username:</strong> admin</p>
              <p><strong>Password:</strong> admin123</p>
            </div>
          </div>
        </div>
      </div>
    </section>
    <script src="js/auth.js"></script>
  </body>
</html>
